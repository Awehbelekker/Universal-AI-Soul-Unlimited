name: Build Capacitor Android APK

on:
  push:
    branches: [main, master]
    paths:
      - "mobile/**"
      - "web/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Sync web → Capacitor Android
        working-directory: mobile
        run: |
          npm run sync-www
          npx cap sync android

      - name: Make gradlew executable
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: universal-soul-companion-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload mapping (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs
          path: mobile/android/**/build/reports/**
          if-no-files-found: ignore
